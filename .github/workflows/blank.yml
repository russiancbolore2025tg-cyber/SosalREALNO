name: Build Unified Heroku SO

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip curl clang file
          pip install wheel setuptools

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Download Static Git for Android ARM64
        run: |
          mkdir -p payload/bin

          # Прямая ссылка на статический бинарный файл Git из репозитория EXALAB/git-static
          GIT_URL="https://raw.githubusercontent.com/EXALAB/git-static/master/output/arm64/bin/git"

          echo "Downloading Git binary from: $GIT_URL"
          if curl -s -L -f -o "payload/bin/git" "$GIT_URL"; then
              echo "Git downloaded successfully."
              # Выдача прав на исполнение бинарного файла
              chmod +x payload/bin/git
          else
              echo "Critical Error: Failed to download Git from $GIT_URL"
              exit 1
          fi

      - name: Clone Heroku Userbot Source
        run: |
          git clone --depth 1 https://github.com/coddrago/Heroku temp_heroku
          mkdir -p payload/heroku_app
          mv temp_heroku/* payload/heroku_app/
          rm -rf temp_heroku

      - name: Direct Patching of Telegram Session Parameters (Anti-Ban)
        run: |
          # Внесение изменений в параметры сессии Telethon до компиляции SO
          python3 -c '
          import os
          
          main_py_path = "payload/heroku_app/heroku/main.py"
          if os.path.exists(main_py_path):
              with open(main_py_path, "r", encoding="utf-8") as f:
                  code = f.read()
              
              # Принудительная замена параметров девайса на безопасные
              code = code.replace("device_model=get_app_name(),", "device_model=\"Pixel 8 Pro\",")
              code = code.replace("system_version=generate_random_system_version(),", "system_version=\"Android 14\",")
              code = code.replace("app_version=\".\".join(map(str, list(__version__))) + \" x64\",", "app_version=\"12.5.1\",")
              
              with open(main_py_path, "w", encoding="utf-8") as f:
                  f.write(code)
              print("main.py successfully patched.")
          '

      - name: Compile TgCrypto-pyrofork for Android ARM64
        run: |
          mkdir -p wheels_binary
          mkdir -p temp_src

          echo "Downloading TgCrypto-pyrofork source code..."
          pip download TgCrypto-pyrofork --no-binary=:all: --no-deps -d temp_src
          tar -xzf temp_src/TgCrypto-pyrofork-*.tar.gz -C temp_src/

          # Экспорт путей компилятора Android NDK
          export CC=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang
          export CFLAGS="-target aarch64-linux-android31 -I$pythonLocation/include/python3.11"
          export LDFLAGS="-target aarch64-linux-android31 -L$pythonLocation/lib"

          echo "Compiling C-extensions of TgCrypto-pyrofork for Android ARM64..."
          cd temp_src/TgCrypto-pyrofork-*
          python setup.py bdist_wheel --plat-name=android_21_arm64_v8a
          
          # Перенос скомпилированного .whл в папку бинарных колес
          mv dist/*.whl ../../wheels_binary/
          cd ../..
          rm -rf temp_src

      - name: Download and Extract All Python Dependencies (Pure & Binary)
        run: |
          python3 -c '
          import os
          import subprocess
          import zipfile
          import tarfile
          import glob

          # Создание папок
          os.makedirs("wheels_binary", exist_ok=True)
          os.makedirs("wheels_pure", exist_ok=True)
          os.makedirs("payload/site-packages", exist_ok=True)

          # Пакет TgCrypto-pyrofork мы скомпилировали на предыдущем шаге,
          # остальные бинарники берем из индекса Chaquopy 16.0
          binary_reqs = [
              "pydantic-core>=2.10.0",
              "orjson",
              "psutil==6.0.0",
              "Pillow"
          ]

          pure_reqs = [
              "heroku-tl-new==2.0.0",
              "pyaes",
              "aiofile==3.8.1",
              "aiofiles==24.1.0",
              "aiogram==3.26.0",
              "pydantic>=2.10.4",
              "gitpython==3.1.2",
              "deep-translator",
              "meval==2.5",
              "aiohttp_jinja2==1.5",
              "aiohttp==3.11.18",
              "Jinja2==3.0.3",
              "requests==2.27.1",
              "certifi==2024.8.30",
              "grapheme==0.6.0",
              "emoji==2.1.0",
              "werkzeug==2.2.2",
              "rsa==4.9",
              "ruamel.yaml==0.17.21",
              "bs4==0.0.2"
          ]

          with open("reqs_binary.txt", "w") as f:
              f.write("\n".join(binary_reqs))

          with open("reqs_pure.txt", "w") as f:
              f.write("\n".join(pure_reqs))

          # 1. Загрузка бинарных пакетов, скомпилированных под Android ARM64 из репозитория Chaquopy 16.0
          print("Downloading compiled binary wheels for Android ARM64 from Chaquopy 16.0...")
          subprocess.run([
              "pip", "download",
              "--only-binary=:all:",
              "--platform", "android_21_arm64_v8a",
              "--implementation", "cp",
              "--python-version", "311",
              "--abi", "cp311",
              "--index-url", "https://chaquo.com/pypi-16.0/",
              "-r", "reqs_binary.txt",
              "-d", "wheels_binary"
          ], check=True)

          # 2. Загрузка чистых (платформонезависимых) Python-пакетов из стандартного PyPI
          print("Downloading pure Python wheels/tarballs...")
          subprocess.run([
              "pip", "download",
              "-r", "reqs_pure.txt",
              "-d", "wheels_pure"
          ], check=True)

          # Функция распаковки скачанных архивов в payload/site-packages
          def extract_archive(filepath, dest):
              if filepath.endswith(".whl") or filepath.endswith(".zip"):
                  with zipfile.ZipFile(filepath, "r") as z:
                      z.extractall(dest)
              elif filepath.endswith(".tar.gz") or filepath.endswith(".tgz"):
                  with tarfile.open(filepath, "r:gz") as t:
                      t.extractall(dest)

          print("Extracting compiled binary packages (including our custom built TgCrypto-pyrofork)...")
          for f in glob.glob("wheels_binary/*"):
              extract_archive(f, "payload/site-packages")

          print("Extracting pure Python packages...")
          for f in glob.glob("wheels_pure/*"):
              extract_archive(f, "payload/site-packages")

          print("Dependencies preparation complete.")
          '

      - name: Compress Payload into ZIP
        run: |
          cd payload
          zip -r ../payload.zip .
          cd ..
          rm -rf payload

      - name: Generate C Payload Header
        run: |
          python3 -c '
          import os
          with open("payload.zip", "rb") as f:
              data = f.read()
          
          out = []
          out.append("unsigned char payload_zip[] = {")
          for i, byte in enumerate(data):
              if i % 12 == 0:
                  out.append("\n    ")
              out.append(f"0x{byte:02x}, ")
          out.append("\n};\n")
          out.append(f"unsigned int payload_zip_len = {len(data)};\n")
          
          with open("payload.h", "w") as out_f:
              out_f.write("".join(out))
          '

      - name: Create Loader C Source
        run: |
          cat << 'EOF' > loader.c
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include "payload.h"

          #ifdef __cplusplus
          extern "C" {
          #endif

          void extract_payload(const char* dest_dir) {
              char out_path[1024];
              snprintf(out_path, sizeof(out_path), "%s/payload.zip", dest_dir);
              
              FILE* f = fopen(out_path, "wb");
              if (f) {
                  fwrite(payload_zip, 1, payload_zip_len, f);
                  fclose(f);
              }
          }

          #ifdef __cplusplus
          }
          #endif
          EOF

      - name: Compile Unified Shared Library using NDK Clang
        run: |
          $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android32-clang \
            -shared \
            -O3 \
            -o libheroku_core.so \
            loader.c

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libheroku_core
          path: libheroku_core.so
